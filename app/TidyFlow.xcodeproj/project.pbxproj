			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "# Build tidyflow-core with configuration-aware cargo profile\n# Add cargo to PATH (Xcode doesn't load shell profile)\nexport PATH=\"$HOME/.cargo/bin:$PATH\"\n\nSTAMP_FILE=\"$DERIVED_FILE_DIR/build-core-script.stamp\"\nmkdir -p \"$(dirname \"$STAMP_FILE\")\"\n\n# iOS target doesn't embed tidyflow-core\nif [[ \"$PLATFORM_NAME\" == iphone* ]]; then\n    echo \"Skipping core build on iOS ($PLATFORM_NAME)\"\n    touch \"$STAMP_FILE\"\n    exit 0\nfi\n\nCORE_DIR=\"$SRCROOT/../core\"\nif [ ! -d \"$CORE_DIR\" ]; then\n    echo \"warning: Core directory not found at $CORE_DIR\"\n    touch \"$STAMP_FILE\"\n    exit 0\nfi\n\nCORE_PROFILE=\"${TIDYFLOW_CORE_PROFILE:-}\"\nif [ -z \"$CORE_PROFILE\" ]; then\n    if [ \"$CONFIGURATION\" = \"Debug\" ]; then\n        CORE_PROFILE=\"debug\"\n    else\n        CORE_PROFILE=\"release\"\n    fi\nfi\n\ncase \"$CORE_PROFILE\" in\n    debug)\n        CARGO_CMD=(cargo build)\n        CORE_BINARY=\"$CORE_DIR/target/debug/tidyflow-core\"\n        ;;\n    release)\n        CARGO_CMD=(cargo build --release)\n        CORE_BINARY=\"$CORE_DIR/target/release/tidyflow-core\"\n        ;;\n    *)\n        echo \"warning: Unsupported TIDYFLOW_CORE_PROFILE=$CORE_PROFILE\"\n        touch \"$STAMP_FILE\"\n        exit 0\n        ;;\nesac\n\ncd \"$CORE_DIR\"\nif [ \"$SKIP_CORE_BUILD\" = \"1\" ]; then\n    echo \"Skipping core build (SKIP_CORE_BUILD=1, profile=$CORE_PROFILE)\"\nelse\n    echo \"Building tidyflow-core ($CORE_PROFILE)...\"\n    if \"${CARGO_CMD[@]}\"; then\n        echo \"Core build succeeded\"\n    else\n        echo \"warning: Core build failed, app may not work correctly\"\n    fi\nfi\n\n# Copy binary to Resources/Core\nDEST_DIR=\"$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources/Core\"\nif [ -f \"$CORE_BINARY\" ]; then\n    mkdir -p \"$DEST_DIR\"\n    cp \"$CORE_BINARY\" \"$DEST_DIR/\"\n    echo \"Copied tidyflow-core to $DEST_DIR\"\nelse\n    echo \"warning: Core binary not found at $CORE_BINARY\"\nfi\n\ntouch \"$STAMP_FILE\"\n";
		};
