name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ============================================================================
  # Layer 1: Core 单元测试 + 覆盖率门禁
  # ============================================================================
  core-unit:
    name: Core Unit Tests + Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run unit tests with coverage (70% threshold)
        run: |
          ./scripts/tools/coverage.sh --ci --threshold 70 --key-modules
        env:
          COVERAGE_THRESHOLD: 70

  # ============================================================================
  # Layer 2: Core 代码质量门禁（fmt + clippy 零告警）
  # ============================================================================
  core-lint:
    name: Core Lint (fmt + clippy zero warnings)
    runs-on: ubuntu-latest
    needs: core-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --manifest-path core/Cargo.toml --all --check

      - name: Clippy zero warnings
        run: cargo clippy --manifest-path core/Cargo.toml --all-targets -- -D warnings

  # ============================================================================
  # Layer 3: Core 协议集成测试（自动启停）
  # ============================================================================
  core-protocol:
    name: Core Protocol Integration Tests
    runs-on: ubuntu-latest
    needs: core-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Core release
        run: cargo build --manifest-path core/Cargo.toml --release

      - name: Run protocol integration tests
        run: |
          cargo test --manifest-path core/Cargo.toml --test protocol_v1 -- --test-threads=1 --nocapture
        timeout-minutes: 10

  # ============================================================================
  # Layer 3: 协议一致性检查
  # ============================================================================
  protocol-consistency:
    name: Protocol Consistency Checks
    runs-on: ubuntu-latest
    needs: core-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run architecture guard checks
        run: |
          ./scripts/tools/check_protocol_consistency.sh
          ./scripts/tools/check_protocol_schema_sync.sh
          ./scripts/tools/gen_protocol_action_table.sh --check
          ./scripts/tools/gen_protocol_action_swift_rules.sh --check
          ./scripts/tools/check_protocol_action_sync.sh
          ./scripts/tools/check_version_consistency.sh

  # ============================================================================
  # Layer 4: 脚本语法检查
  # ============================================================================
  script-lint:
    name: Script Syntax Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          bash -n scripts/evo-run.sh
          bash -n scripts/evo-screenshot.sh
          bash -n scripts/release_local.sh
          bash -n scripts/build_dmg.sh
          bash -n scripts/notarize.sh
          bash -n scripts/run-app.sh
          bash -n scripts/tidyflow
          bash -n scripts/tools/read_version.sh
          bash -n scripts/tools/gen_sha256.sh
          bash -n scripts/tools/check_protocol_consistency.sh
          bash -n scripts/tools/check_protocol_schema_sync.sh
          bash -n scripts/tools/gen_protocol_action_table.sh
          bash -n scripts/tools/gen_protocol_action_swift_rules.sh
          bash -n scripts/tools/check_protocol_action_sync.sh
          bash -n scripts/tools/check_version_consistency.sh
          bash -n scripts/tools/coverage.sh

  # ============================================================================
  # Layer 5: Evolution 质量门禁干运行
  # ============================================================================
  evolution-quality-gate:
    name: Evolution Quality Gate (Dry Run)
    runs-on: ubuntu-latest
    needs: [core-unit, protocol-consistency]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evolution quality-gate contract dry-run
        run: |
          CYCLE_ID="ci-dry-run-${GITHUB_RUN_ID}"
          mkdir -p ".tidyflow/evolution/${CYCLE_ID}"
          ./scripts/tidyflow quality-gate --cycle "${CYCLE_ID}" --step all --dry-run
          RUN_ID="$(ls -1 ".tidyflow/evolution/${CYCLE_ID}/runs" | sort | tail -n 1)"
          METRICS=".tidyflow/evolution/${CYCLE_ID}/runs/${RUN_ID}/evidence/v-6-metrics-${RUN_ID}.json"
          python3 - "$METRICS" <<'PY'
import json
import sys
from pathlib import Path
metrics = Path(sys.argv[1])
data = json.loads(metrics.read_text(encoding="utf-8"))
missing = data.get("metrics", {}).get("missing_types", [])
if missing:
    raise SystemExit(f"missing evidence types: {missing}")
checks = {c.get("check_id"): c.get("result") for c in data.get("checks", [])}
for check_id in ["v-1", "v-2", "v-3", "v-4", "v-5", "v-6"]:
    if checks.get(check_id) != "pass":
        raise SystemExit(f"check failed or missing: {check_id}")
PY

  # ============================================================================
  # 总结：所有测试层通过后才算 CI 通过
  # ============================================================================
  ci-pass:
    name: CI All Layers Pass
    runs-on: ubuntu-latest
    needs: [core-unit, core-lint, core-protocol, protocol-consistency, script-lint, evolution-quality-gate]
    if: success()

    steps:
      - name: All tests passed
        run: echo "All CI layers passed successfully!"
