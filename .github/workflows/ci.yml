name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ============================================================================
  # Layer 1: Core 单元测试 + 覆盖率门禁
  # ============================================================================
  core-unit:
    name: Core Unit Tests + Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run unit tests with coverage (70% threshold)
        run: |
          ./scripts/tools/coverage.sh --ci --threshold 70 --key-modules
        env:
          COVERAGE_THRESHOLD: 70

  # ============================================================================
  # Layer 2: Core 代码质量门禁（fmt + clippy 零告警）
  # ============================================================================
  core-lint:
    name: Core Lint (fmt + clippy zero warnings)
    runs-on: ubuntu-latest
    needs: core-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --manifest-path core/Cargo.toml --all --check

      - name: Clippy zero warnings
        run: cargo clippy --manifest-path core/Cargo.toml --all-targets -- -D warnings

  # ============================================================================
  # Layer 3: Core 协议集成测试（自动启停）
  # ============================================================================
  core-protocol:
    name: Core Protocol Integration Tests
    runs-on: ubuntu-latest
    needs: core-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Core release
        run: cargo build --manifest-path core/Cargo.toml --release

      - name: Run protocol integration tests
        run: |
          cargo test --manifest-path core/Cargo.toml --test protocol_v1 -- --test-threads=1 --nocapture
        timeout-minutes: 10

  # ============================================================================
  # Layer 3: 协议一致性检查
  # ============================================================================
  protocol-consistency:
    name: Protocol Consistency Checks
    runs-on: ubuntu-latest
    needs: core-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run architecture guard checks
        run: ./scripts/tidyflow check

  # ============================================================================
  # Layer 4: 脚本语法检查
  # ============================================================================
  script-lint:
    name: Script Syntax Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          bash -n scripts/evo-run.sh
          bash -n scripts/evo-screenshot.sh
          bash -n scripts/release_local.sh
          bash -n scripts/build_dmg.sh
          bash -n scripts/notarize.sh
          bash -n scripts/run-app.sh
          bash -n scripts/tidyflow
          bash -n scripts/tools/read_version.sh
          bash -n scripts/tools/gen_sha256.sh
          bash -n scripts/tools/check_protocol_consistency.sh
          bash -n scripts/tools/check_protocol_schema_sync.sh
          bash -n scripts/tools/gen_protocol_action_table.sh
          bash -n scripts/tools/gen_protocol_action_swift_rules.sh
          bash -n scripts/tools/check_protocol_action_sync.sh
          bash -n scripts/tools/check_version_consistency.sh
          bash -n scripts/tools/coverage.sh
          bash -n scripts/e2e/fixtures/bootstrap.sh
          bash -n scripts/e2e/run-device.sh
          bash -n scripts/e2e/run-all.sh
          bash -n scripts/e2e/quality-gate.sh
          bash -n scripts/e2e/main.sh
          bash -n scripts/e2e/iphone.sh
          bash -n scripts/e2e/ipad.sh
          bash -n scripts/e2e/mac.sh
  # ============================================================================
  # Layer 5: Evolution 质量门禁干运行 + 性能门禁契约自测
  # ============================================================================
  evolution-quality-gate:
    name: Evolution Quality Gate (Dry Run) + Perf Gate Self-Tests
    runs-on: ubuntu-latest
    needs: [core-unit, protocol-consistency]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 性能门禁契约自测（check_perf_gate_contract --self-test）
        run: |
          python3 scripts/tools/check_perf_gate_contract.py --self-test

      - name: Core 热点比较器自测（check_hotspot_perf_regression --self-test）
        run: |
          python3 scripts/tools/check_hotspot_perf_regression.py --self-test

      - name: Apple 客户端比较器自测（check_apple_client_perf_regression --self-test）
        run: |
          python3 scripts/tools/check_apple_client_perf_regression.py --self-test

      - name: Evolution quality-gate contract dry-run
        run: |
          CYCLE_ID="ci-dry-run-${GITHUB_RUN_ID}"
          mkdir -p ".tidyflow/evolution/${CYCLE_ID}"
          ./scripts/tidyflow quality-gate \
            --cycle "${CYCLE_ID}" \
            --step all \
            --dry-run \
            --project tidyflow \
            --workspace default \
            --skip-apple \
            --json

      - name: 校验 quality-gate --dry-run --json 含结构化 performance_regression 节点
        run: |
          CYCLE_ID="ci-dry-run-${GITHUB_RUN_ID}"
          ./scripts/tidyflow quality-gate \
            --cycle "${CYCLE_ID}" \
            --step all \
            --dry-run \
            --project tidyflow \
            --workspace default \
            --skip-apple \
            --json | python3 -c "
import json, sys
d = json.load(sys.stdin)
qg = d.get('quality_gate', {})
pr = qg.get('performance_regression')
assert pr is not None, 'quality_gate.performance_regression 节点缺失'
assert 'overall' in pr, 'performance_regression.overall 缺失'
assert 'release_blocking' in pr, 'performance_regression.release_blocking 缺失'
assert 'contract_version' in pr, 'performance_regression.contract_version 缺失'
assert 'reason_codes' in pr, 'performance_regression.reason_codes 缺失'
assert 'suite_results' in pr, 'performance_regression.suite_results 缺失'
print('OK: quality_gate.performance_regression 结构化节点校验通过')
"

  # ============================================================================
  # Layer 6: Apple 多工作区定向回归门禁（macOS 构建验证）
  # 仅在 macOS runner 上执行，Apple 平台约束要求串行构建。
  # ============================================================================
  apple-multi-workspace-regression:
    name: Apple Multi-Workspace Regression Gate
    runs-on: macos-15
    needs: [core-unit, protocol-consistency]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer || true

      - name: macOS Debug Build (verify Apple client compiles)
        run: ./scripts/tidyflow apple-build macos --skip-core

      - name: Apple Multi-Workspace Regression Tests (macOS)
        run: ./scripts/tidyflow apple-regression --macos-only

      - name: iOS Simulator Debug Build (verify iOS client compiles)
        run: ./scripts/tidyflow apple-build ios --skip-core

  # ============================================================================
  # 总结：所有测试层通过后才算 CI 通过
  # ============================================================================
  ci-pass:
    name: CI All Layers Pass
    runs-on: ubuntu-latest
    needs: [core-unit, core-lint, core-protocol, protocol-consistency, script-lint, evolution-quality-gate, apple-multi-workspace-regression]
    if: success()

    steps:
      - name: All tests passed
        run: echo "All CI layers passed successfully!"
