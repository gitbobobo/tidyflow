name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core-and-scripts:
    name: Core Tests + Script Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (core)
        run: cargo test --manifest-path core/Cargo.toml

      - name: Bash syntax check
        run: |
          bash -n scripts/evo-run.sh
          bash -n scripts/evo-screenshot.sh
          bash -n scripts/release_local.sh
          bash -n scripts/build_dmg.sh
          bash -n scripts/notarize.sh
          bash -n scripts/run-app.sh
          bash -n scripts/tidyflow
          bash -n scripts/tools/read_version.sh
          bash -n scripts/tools/gen_sha256.sh
          bash -n scripts/tools/check_protocol_consistency.sh
          bash -n scripts/tools/check_protocol_schema_sync.sh
          bash -n scripts/tools/gen_protocol_action_table.sh
          bash -n scripts/tools/gen_protocol_action_swift_rules.sh
          bash -n scripts/tools/check_protocol_action_sync.sh
          bash -n scripts/tools/check_version_consistency.sh

      - name: Architecture guard checks
        run: |
          ./scripts/tools/check_protocol_consistency.sh
          ./scripts/tools/check_protocol_schema_sync.sh
          ./scripts/tools/gen_protocol_action_table.sh --check
          ./scripts/tools/gen_protocol_action_swift_rules.sh --check
          ./scripts/tools/check_protocol_action_sync.sh
          ./scripts/tools/check_version_consistency.sh

      - name: Evolution quality-gate contract dry-run
        run: |
          CYCLE_ID="ci-dry-run-${GITHUB_RUN_ID}"
          mkdir -p ".tidyflow/evolution/${CYCLE_ID}"
          ./scripts/tidyflow quality-gate --cycle "${CYCLE_ID}" --step all --dry-run
