protocol_version: 9

# ============================================================================
# HTTP/WS 传输边界约定（v9 权威声明）
#
# http_read_via_ws_removed: 以下 WS action 已移除读取能力，Core 返回 read_via_http_required。
# http_read_endpoints:      HTTP 只读端点列表（供一致性校验脚本引用）。
# ws_stream_actions:        WS 专用流式推送/写入 action 前缀，不提供 HTTP 等价入口。
#
# 多工作区边界字段：所有 HTTP 响应和 WS 事件必须携带 project / workspace 字段；
# session_id 和 cycle_id 在 AI / Evolution 相关消息中为条件必须字段。
# 不允许仅凭 workspace 名称路由，不允许把 default 工作区视为隐含单例。
# ============================================================================

# 协议域权威定义（用于 Core/App/文档一致性校验）
domains:
  - id: system
    action_rule: exact("ping")
    # HTTP 只读端点
    http_read_endpoints:
      - GET /api/v1/system/snapshot
    # v1.42: system_snapshot 可观测性字段扩展
    # perf_metrics   - 统一性能指标快照（WS 管线延迟、广播计数、终端回收等）
    # log_context    - 结构化日志关联上下文摘要（日志路径、保留天数、perf 日志开关）
    # 字段由 Core 权威输出，客户端只消费；perf_metrics 不按工作区隔离（全局计数器），
    # cache_metrics / terminal_resource 继续按 (project, workspace) 隔离。
    observability_fields:
      perf_metrics:
        description: "统一性能指标快照"
        scope: global
        fields:
          - ws_task_broadcast_lag_total
          - ws_task_broadcast_queue_depth
          - ws_task_broadcast_skipped_single_receiver_total
          - ws_task_broadcast_skipped_empty_target_total
          - ws_task_broadcast_filtered_target_total
          - terminal_unacked_timeout_total
          - terminal_reclaimed_total
          - terminal_scrollback_trim_total
          - project_command_output_throttled_total
          - project_command_output_emitted_total
          - ws_outbound_loop_tick    # {last_ms, max_ms, count}
          - ws_outbound_select_wait  # {last_ms, max_ms, count}
          - ws_outbound_handle       # {last_ms, max_ms, count}
          - ws_decode                # {last_ms, max_ms, count}
          - ws_dispatch              # {last_ms, max_ms, count}
          - ws_encode                # {last_ms, max_ms, count}
          - ws_outbound_queue_depth
          - ws_batch_flush_size
          - ws_batch_flush_count
          - ai_subscriber_fanout
          - ai_subscriber_fanout_max
          - evolution_cycle_update_emitted_total
          - evolution_cycle_update_debounced_total
          - evolution_snapshot_fallback_total
      log_context:
        description: "结构化日志关联上下文摘要"
        scope: global
        fields:
          - log_file           # 当天日志文件路径
          - retention_days     # 日志保留天数
          - perf_logging_enabled  # TIDYFLOW_PERF_LOG 是否启用
  - id: terminal
    action_rule: prefix("term_") | one_of("spawn_terminal","kill_terminal","input","resize")
    http_read_endpoints:
      - GET /api/v1/terminals
    ws_read_via_http_required:
      - term_list
  - id: file
    action_rule: prefix("file_") | prefix("watch_") | one_of("clipboard_image_upload")
    http_read_endpoints:
      - GET /api/v1/projects/:project/workspaces/:workspace/files
      - GET /api/v1/projects/:project/workspaces/:workspace/files/index
      - GET /api/v1/projects/:project/workspaces/:workspace/files/content
    ws_read_via_http_required:
      - file_list
      - file_index
      - file_read
    required_boundary_fields:
      - project
      - workspace
  - id: git
    action_rule: prefix("git_") | one_of("cancel_ai_task")
    http_read_endpoints:
      - GET /api/v1/projects/:project/workspaces/:workspace/git/status
      - GET /api/v1/projects/:project/workspaces/:workspace/git/diff
      - GET /api/v1/projects/:project/workspaces/:workspace/git/branches
      - GET /api/v1/projects/:project/workspaces/:workspace/git/log
      - GET /api/v1/projects/:project/workspaces/:workspace/git/commits/:sha
      - GET /api/v1/projects/:project/workspaces/:workspace/git/op-status
      - GET /api/v1/projects/:project/git/integration-status
      - GET /api/v1/projects/:project/workspaces/:workspace/git/up-to-date
      - GET /api/v1/projects/:project/workspaces/:workspace/git/conflicts/detail
    ws_read_via_http_required:
      - git_status
      - git_diff
      - git_branches
      - git_log
      - git_show
      - git_op_status
      - git_integration_status
      - git_check_branch_up_to_date
      - git_conflict_detail
    required_boundary_fields:
      - project
      - workspace
  - id: project
    action_rule: prefix("list_","select_","import_","create_","remove_","project_","workspace_","save_project_commands","run_project_command","cancel_project_command")
    http_read_endpoints:
      - GET /api/v1/projects
      - GET /api/v1/projects/:project/workspaces
      - GET /api/v1/tasks
      - GET /api/v1/templates
      - GET /api/v1/templates/:template_id/export
    ws_read_via_http_required:
      - list_projects
      - list_workspaces
      - list_tasks
      - list_templates
      - export_template
  - id: settings
    action_rule: contains("client_settings")
    http_read_endpoints:
      - GET /api/v1/client-settings
    ws_read_via_http_required:
      - get_client_settings
  - id: log
    action_rule: prefix("log_")
  # AI payload 兼容说明（字段定义在 core 协议 DTO 中）：
  # - ai_chat_send / ai_chat_command 现支持可选 audio_parts
  # - ACP content 双栈兼容：text/image/audio/resource/resource_link
# v1.42 路由元数据扩展（向后兼容，旧客户端忽略新字段）：
  # ai_chat_done 新增可选字段：
  #   route_decision: { provider_id, model_id, agent?, task_type, selected_by, is_fallback, fallback_reason? }
  #   budget_status:  { budget_exceeded, last_exceeded_reason?, total_tokens?, estimated_cost? }
  # ai_chat_error 新增可选字段：
  #   route_decision: 同上
  # selected_by 取值：explicit | task_type_policy | selection_hint | default
  - id: ai
    action_rule: prefix("ai_")
    # HTTP 只读端点（已移除对应 WS 读取 action）
    http_read_endpoints:
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/sessions
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/sessions/:session_id/messages
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/sessions/:session_id/status
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/providers
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/agents
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/slash-commands
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/session-config-options
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/sessions/:session_id/context-snapshot
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/context-snapshots
    ws_read_via_http_required:
      - ai_session_list
      - ai_session_messages
      - ai_session_status
      - ai_provider_list
      - ai_agent_list
      - ai_slash_commands
      - ai_session_config_options
      - ai_session_context_snapshot
      - ai_cross_context_snapshots
    # WS 专用订阅控制（不提供 HTTP 等价入口）
    ws_only_actions:
      - ai_session_subscribe
      - ai_session_unsubscribe
    # WS 专用流式推送事件（写向客户端）
    ws_stream_events:
      - ai_session_messages_update
      - ai_session_status_update
      - ai_session_subscribe_ack
      - ai_chat_done
      - ai_chat_error
      - ai_chat_pending
      - ai_question_asked
      - ai_question_cleared
      - ai_session_started
      - ai_context_snapshot_updated
    # 必须携带的多工作区边界字段
    required_boundary_fields:
      - project
      - workspace
      - session_id  # AI 消息中条件必须
  - id: evidence
    action_rule: prefix("evidence_")
    # HTTP 只读端点（已移除对应 WS 读取 action）
    http_read_endpoints:
      - GET /api/v1/evidence/projects/:project/workspaces/:workspace/snapshot
      - GET /api/v1/evidence/projects/:project/workspaces/:workspace/rebuild-prompt
      - GET /api/v1/evidence/projects/:project/workspaces/:workspace/items/:item_id/chunk
    ws_read_via_http_required:
      - evidence_get_snapshot
      - evidence_get_rebuild_prompt
      - evidence_read_item
    required_boundary_fields:
      - project
      - workspace
  - id: evolution
    action_rule: prefix("evo_")
    # HTTP 只读端点（已移除对应 WS 读取 action）
    http_read_endpoints:
      - GET /api/v1/evolution/snapshot
      - GET /api/v1/evolution/projects/:project/workspaces/:workspace/agent-profile
      - GET /api/v1/evolution/projects/:project/workspaces/:workspace/cycle-history
    ws_read_via_http_required:
      - evo_get_snapshot
      - evo_get_agent_profile
      - evo_list_cycle_history
    # WS 专用流式推送事件（写向客户端）
    ws_stream_events:
      - evo_cycle_updated
      - evo_workspace_status
      - evo_error
      - evo_blocking_required
      - evo_blockers_updated
      - evo_auto_commit_result
      - evo_pulse
      - evo_cycle_history
      - evo_agent_profile
    required_boundary_fields:
      - project
      - workspace
      - cycle_id  # Evolution 消息中条件必须
  # v1.41: 系统健康诊断与自修复域
  # health_report     - 客户端上报自身运行健康状态
  # health_snapshot   - Core 推送系统健康快照（incidents、摘要）
  # health_repair     - 客户端请求执行修复动作
  # health_repair_result - Core 推送修复执行结果
  - id: health
    action_rule: prefix("health_")
  # v1.40: 冲突向导（Git conflict wizard）
  # git_conflict_detail / git_conflict_accept_ours / git_conflict_accept_theirs
  # git_conflict_accept_both / git_conflict_mark_resolved
  # 所有动作都以 git_ 前缀路由到 git 域（已由 git 域规则覆盖）
