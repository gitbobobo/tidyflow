protocol_version: 7

# ============================================================================
# HTTP/WS 传输边界约定（v7 权威声明）
#
# http_read_via_ws_removed: 以下 WS action 已移除读取能力，Core 返回 read_via_http_required。
# http_read_endpoints:      HTTP 只读端点列表（供一致性校验脚本引用）。
# ws_stream_actions:        WS 专用流式推送/写入 action 前缀，不提供 HTTP 等价入口。
#
# 多工作区边界字段：所有 HTTP 响应和 WS 事件必须携带 project / workspace 字段；
# session_id 和 cycle_id 在 AI / Evolution 相关消息中为条件必须字段。
# 不允许仅凭 workspace 名称路由，不允许把 default 工作区视为隐含单例。
# ============================================================================

# 协议域权威定义（用于 Core/App/文档一致性校验）
domains:
  - id: system
    action_rule: exact("ping")
  - id: terminal
    action_rule: prefix("term_") | one_of("spawn_terminal","kill_terminal","input","resize")
  - id: file
    action_rule: prefix("file_") | prefix("watch_") | one_of("clipboard_image_upload")
  - id: git
    action_rule: prefix("git_") | one_of("cancel_ai_task")
    # v1.43 统一运行状态面板新增字段（向后兼容）：
    # TaskSnapshotEntry 新增：
    #   duration_ms:  运行耗时（毫秒），Core 在完成时计算
    #   error_code:   失败诊断码（仅 status=failed 时填充）
    #   error_detail:  失败诊断详情（仅 status=failed 时填充）
    #   retryable:    是否可安全重试（bool，Core 根据 task_type + 错误类型判定）
  - id: project
    action_rule: prefix("list_","select_","import_","create_","remove_","project_","workspace_","save_project_commands","run_project_command","cancel_project_command")
  - id: settings
    action_rule: contains("client_settings")
  - id: log
    action_rule: prefix("log_")
  # AI payload 兼容说明（字段定义在 core 协议 DTO 中）：
  # - ai_chat_send / ai_chat_command 现支持可选 audio_parts
  # - ACP content 双栈兼容：text/image/audio/resource/resource_link
  # v1.42 路由元数据扩展（向后兼容，旧客户端忽略新字段）：
  # ai_chat_done 新增可选字段：
  #   route_decision: { provider_id, model_id, agent?, task_type, selected_by, is_fallback, fallback_reason? }
  #   budget_status:  { budget_exceeded, last_exceeded_reason?, total_tokens?, estimated_cost? }
  # ai_chat_error 新增可选字段：
  #   route_decision: 同上
  # selected_by 取值：explicit | task_type_policy | selection_hint | default
  - id: ai
    action_rule: prefix("ai_")
    # HTTP 只读端点（已移除对应 WS 读取 action）
    http_read_endpoints:
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/sessions
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/sessions/:session_id/messages
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/sessions/:session_id/status
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/providers
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/agents
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/slash-commands
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/session-config-options
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/:ai_tool/sessions/:session_id/context-snapshot
      - GET /api/v1/projects/:project/workspaces/:workspace/ai/context-snapshots
    ws_read_via_http_required:
      - ai_session_list
      - ai_session_messages
      - ai_session_status
      - ai_provider_list
      - ai_agent_list
      - ai_slash_commands
      - ai_session_config_options
      - ai_session_context_snapshot
      - ai_cross_context_snapshots
    # WS 专用订阅控制（不提供 HTTP 等价入口）
    ws_only_actions:
      - ai_session_subscribe
      - ai_session_unsubscribe
    # WS 专用流式推送事件（写向客户端）
    ws_stream_events:
      - ai_session_messages_update
      - ai_session_status_update
      - ai_session_subscribe_ack
      - ai_chat_done
      - ai_chat_error
      - ai_chat_pending
      - ai_question_asked
      - ai_question_cleared
      - ai_session_started
      - ai_context_snapshot_updated
    # 必须携带的多工作区边界字段
    required_boundary_fields:
      - project
      - workspace
      - session_id  # AI 消息中条件必须
  - id: evidence
    action_rule: prefix("evidence_")
    # HTTP 只读端点（已移除对应 WS 读取 action）
    http_read_endpoints:
      - GET /api/v1/evidence/projects/:project/workspaces/:workspace/snapshot
      - GET /api/v1/evidence/projects/:project/workspaces/:workspace/rebuild-prompt
      - GET /api/v1/evidence/projects/:project/workspaces/:workspace/items/:item_id/chunk
    ws_read_via_http_required:
      - evidence_get_snapshot
      - evidence_get_rebuild_prompt
      - evidence_read_item
    required_boundary_fields:
      - project
      - workspace
  - id: evolution
    action_rule: prefix("evo_")
    # HTTP 只读端点（已移除对应 WS 读取 action）
    http_read_endpoints:
      - GET /api/v1/evolution/snapshot
      - GET /api/v1/evolution/projects/:project/workspaces/:workspace/agent-profile
      - GET /api/v1/evolution/projects/:project/workspaces/:workspace/cycle-history
    ws_read_via_http_required:
      - evo_get_snapshot
      - evo_get_agent_profile
      - evo_list_cycle_history
    # WS 专用流式推送事件（写向客户端）
    ws_stream_events:
      - evo_cycle_updated
      - evo_workspace_status
      - evo_error
      - evo_blocking_required
      - evo_blockers_updated
      - evo_auto_commit_result
      - evo_pulse
      - evo_cycle_history
      - evo_agent_profile
    required_boundary_fields:
      - project
      - workspace
      - cycle_id  # Evolution 消息中条件必须
    # v1.43 统一运行状态面板新增字段（向后兼容，旧客户端忽略新字段）：
    # EvolutionWorkspaceItem 和 EvolutionCycleHistoryItem 新增：
    #   started_at:  循环开始时间（RFC3339），用于面板计时
    #   duration_ms: 循环运行耗时（毫秒），Core 在终态时计算
    #   error_code:  失败诊断码（仅终态失败时填充）
    #   retryable:   是否可安全重试（bool，Core 根据终态类型判定）
  # v1.41: 系统健康诊断与自修复域
  # health_report     - 客户端上报自身运行健康状态
  # health_snapshot   - Core 推送系统健康快照（incidents、摘要）
  # health_repair     - 客户端请求执行修复动作
  # health_repair_result - Core 推送修复执行结果
  # v1.44: 调度优化与预测性故障检测（向后兼容，旧客户端忽略新字段）
  # SystemHealthSnapshot 新增可选字段：
  #   scheduling_recommendations: 调度优化建议列表（Core 权威输出）
  #     - recommendation_id: 唯一 ID
  #     - kind: reduce_concurrency | increase_concurrency | adjust_priority | enable_degradation | defer_queuing
  #     - pressure_level: low | moderate | high | critical
  #     - reason: 机器可读原因标识
  #     - summary: 人类可读摘要（可选）
  #     - suggested_value: 建议目标值（可选）
  #     - context: HealthContext（系统级建议 project/workspace 为 null）
  #     - generated_at: 生成时间（Unix ms）
  #     - expires_at: 有效期截止（Unix ms）
  #   predictive_anomalies: 预测异常摘要列表（Core 权威输出）
  #     - anomaly_id: 唯一 ID
  #     - kind: performance_degradation | resource_exhaustion | recurring_failure | rate_limit_risk | cache_efficiency_drop
  #     - confidence: low | medium | high
  #     - root_cause: 机器可读根因标识
  #     - summary: 人类可读摘要（可选）
  #     - time_window: { start_at, end_at }（Unix ms）
  #     - related_incident_ids: 关联历史 incident_id 列表
  #     - context: HealthContext（按 (project, workspace) 隔离）
  #     - score: 预测评分（0.0-1.0）
  #     - predicted_at: 生成时间（Unix ms）
  #   observation_aggregates: 按 (project, workspace) 隔离的观测历史聚合
  #     - project, workspace: 归属标识
  #     - window_start, window_end: 聚合窗口（Unix ms）
  #     - cycle_success_count, cycle_failure_count: 历史循环统计
  #     - avg_cycle_duration_ms, last_cycle_duration_ms: 耗时统计（可选）
  #     - consecutive_failures: 当前连续失败数
  #     - cache_hit_ratio: 缓存命中率（0.0-1.0，可选）
  #     - rate_limit_hit_count: 速率限制事件数
  #     - pressure_level: 资源压力级别（Core 综合判定）
  #     - health_score: 综合健康评分（0.0-1.0）
  #     - aggregated_at: 聚合时间（Unix ms）
  # v1.45: 智能演化分析摘要（向后兼容，旧客户端忽略新字段）
  # EvolutionAnalysisSummary: 统一分析契约，聚合门禁裁决、瓶颈、风险和建议
  #   project, workspace, cycle_id: 隔离维度
  #   gate_decision: 质量门禁裁决（可选）
  #   bottlenecks[]: 瓶颈条目列表
  #     - bottleneck_id: 唯一 ID
  #     - kind: resource | rate_limit | recurring_failure | performance_degradation | configuration | protocol_inconsistency
  #     - reason_code: 机器可读原因编码
  #     - risk_score: 风险等级（0.0-1.0）
  #     - evidence_summary: 人类可读证据摘要
  #     - context: HealthContext
  #     - related_ids: 关联 ID 列表
  #     - detected_at: 识别时间（Unix ms）
  #   overall_risk_score: 综合风险评分（0.0-1.0）
  #   health_score: 综合健康评分（0.0-1.0）
  #   pressure_level: 资源压力级别
  #   predictive_anomaly_ids: 关联预测异常 ID
  #   suggestions[]: 优化建议列表
  #     - suggestion_id: 唯一 ID
  #     - scope: system | workspace
  #     - action: 机器可读动作标识
  #     - summary: 人类可读摘要
  #     - priority: 建议优先级（1 = 最高）
  #     - expected_impact: 预期改善（可选）
  #     - context: HealthContext
  #   analyzed_at: 分析时间（Unix ms）
  #   expires_at: 有效期截止（Unix ms）
  # HTTP 端点：GET /api/v1/system/snapshot 响应新增 analysis_summaries 可选字段
  - id: health
    action_rule: prefix("health_")
  # v1.46: 统一协调层（Coordinator）
  # 将 AI、终端、文件三类领域状态收敛到统一协调治理体系。
  # coordinator_snapshot      - Core 推送工作区协调状态快照
  # coordinator_check         - 客户端请求一致性校验
  # coordinator_check_result  - Core 推送校验结果
  # coordinator_recovery      - 客户端请求执行恢复动作
  # coordinator_recovery_result - Core 推送恢复执行结果
  #
  # WorkspaceCoordinatorState 字段契约：
  #   id:          { project, workspace }（工作区身份）
  #   ai:          { phase, active_session_count, total_session_count }
  #   terminal:    { phase, alive_count, total_count }
  #   file:        { phase, watcher_active, indexing_in_progress }
  #   health:      healthy | degraded | faulted（三领域综合健康度）
  #   generated_at: RFC3339 时间戳
  #   version:     状态版本号（单调递增）
  #
  # CoordinatorSnapshot 字段契约：
  #   snapshot_version: 快照格式版本（当前为 1）
  #   created_at:  快照生成时间
  #   workspaces:  { [global_key]: WorkspaceSnapshotEntry }
  #
  # ConsistencyCheckResult 字段契约：
  #   inconsistencies: 不一致条目列表
  #   recovery_decisions: 恢复决策列表（按优先级排序）
  #   is_consistent: 校验是否通过
  #
  # 多工作区边界：每个工作区独立校验和恢复，不互相影响。
  # 作用域支持 system / project / workspace 三级粒度。
  - id: coordinator
    action_rule: prefix("coordinator_")
    required_boundary_fields:
      - project
      - workspace
    # 协调层可观测性字段（WorkspaceCoordinatorState 权威字段定义）
    # 客户端只消费，不自行推导健康度或活跃资源计数。
    coordinator_observability_fields:
      workspace_id:
        description: "工作区身份 { project, workspace }，所有 coordinator 消息中条件必须"
      ai_phase:
        values: [idle, active, faulted]
        description: "AI 领域相位；active 表示至少一个会话正在执行"
      terminal_phase:
        values: [idle, active, faulted]
        description: "终端领域相位；active 表示至少一个终端正在运行"
      file_phase:
        values: [idle, ready, degraded, error]
        description: "文件领域相位；ready 对应 FileWorkspacePhase::Watching"
      health:
        values: [healthy, degraded, faulted]
        description: "三域综合健康度；由 Core 计算，客户端只读"
      version:
        type: uint64
        description: "状态版本号（单调递增），用于增量更新判断，不回退"
    # 多工作区边界约束：
    # - 每条 coordinator_snapshot 消息只携带一个工作区的状态（非全局快照）
    # - 客户端按 "project:workspace" 全局键维护本地缓存，不允许只用 workspace 名称路由
    # - 工作区删除时，客户端应调用本地缓存的 removeWorkspace 清除对应条目
  # v1.40: 冲突向导（Git conflict wizard）
  # git_conflict_detail / git_conflict_accept_ours / git_conflict_accept_theirs
  # git_conflict_accept_both / git_conflict_mark_resolved
  # 所有动作都以 git_ 前缀路由到 git 域（已由 git 域规则覆盖）

